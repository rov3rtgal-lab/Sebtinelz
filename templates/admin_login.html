<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sentinel — Admin Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .badge {
      display: inline-block;
      background: #dc2626;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 999px;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    h1 {
      color: #f1f5f9;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      color: #94a3b8;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      padding: 0.65rem 0.9rem;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.2rem;
    }

    input:focus { border-color: #dc2626; }

    .btn {
      width: 100%;
      padding: 0.75rem;
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    .btn:hover { background: #b91c1c; }

    .error-msg {
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid #dc2626;
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      color: #475569;
      font-size: 0.8rem;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: #94a3b8; }

    .divider {
      border: none;
      border-top: 1px solid #1e293b;
      margin: 1.5rem 0 1rem;
    }

    .lock-icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="lock-icon">🔐</div>
  <span class="badge">Admin Access</span>
  <h1>Project Sentinel</h1>
  <p class="subtitle">Restricted portal — authorized personnel only.</p>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="error-msg">⚠ {{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST" action="/admin-login">
    <label for="email">Admin Email</label>
    <input type="email" id="email" name="email"
           placeholder="admin@sentinel.gov.ph" required />

    <label for="password">Password</label>
    <input type="password" id="password" name="password"
           placeholder="••••••••" required />

    <button type="submit" class="btn">Access Admin Portal</button>
  </form>

  <a href="/login" class="back-link">← Back to User Login</a>
</div>

</body>
</html>
