<!DOCTYPE html>
<html>
<head>
    <title>Request Legal Aid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow-sm">
        <h3 class="mb-4">Request Legal Assistance</h3>

        <form method="POST">
            <input type="text" name="fullname" class="form-control mb-3" placeholder="Full Name" required>
            <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>
            <input type="text" name="contact" class="form-control mb-3" placeholder="Contact Number" required>

            <textarea name="concern" class="form-control mb-3" rows="4" placeholder="Describe your concern..." required></textarea>

            <button class="btn btn-primary w-100">Submit Request</button>
        </form>
    </div>
</div>

</body>
</html>
